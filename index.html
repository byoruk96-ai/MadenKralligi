<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maden Krallığı - Krallığını Seç</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="game-header">
        <h1 class="gold-text">MADEN KRALLIĞI</h1>
        <p class="motivation-text">Kaderin burada yazılıyor. Hükmedeceğin toprağı seç ve krallığını kur!</p>
    </header>

    <div id="map-container">
        <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
            
            <path d="M120 100 L250 140 L80 180 Z" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,5" />
            <path d="M120 100 L130 130 Z" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,5" />

            <g class="city-node metropol" id="TR-34" title="İstanbul">
                <circle cx="120" cy="100" r="15" />
                <circle cx="120" cy="100" r="25" class="pulse-ring" />
                <text x="120" y="70" fill="#d4af37" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14">İSTANBUL</text>
            </g>

            <g class="city-node" id="TR-16" title="Bursa">
                <circle cx="130" cy="130" r="10" />
                <text x="130" y="150" fill="#aaa" text-anchor="middle" font-family="sans-serif" font-size="12">Bursa</text>
            </g>

            <g class="city-node metropol" id="TR-06" title="Ankara">
                <circle cx="250" cy="140" r="12" />
                <circle cx="250" cy="140" r="20" class="pulse-ring" />
                <text x="250" y="115" fill="#d4af37" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14">ANKARA</text>
